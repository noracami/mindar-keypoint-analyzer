<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindAR AR 測試</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #000; color: #fff; font-size: 1.2rem; z-index: 9999;
    }
    #loading.hidden { display: none; }
    #error {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #000; color: #f44; font-size: 1.2rem; z-index: 9999;
    }
    #error.hidden { display: none; }
    #stats {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 8px 12px; background: rgba(0,0,0,0.7);
      color: #fff; font-size: 0.85rem; z-index: 9998;
      font-family: monospace; display: none;
    }
    #stats.visible { display: block; }
    #stats .label { color: #aaa; }
    #stats .found { color: #4f4; }
    #stats .lost { color: #f44; }
    .a-enter-vr { display: none !important; }
  </style>
</head>
<body>
  <div id="loading">載入中...</div>
  <div id="error" class="hidden"></div>
  <div id="stats"></div>
  <script type="module" src="/src/test.js"></script>
</body>
</html>
